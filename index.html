<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Battle Grounds: Ultimate</title>
    <style>
        body {
            margin: 0;
            background: #050510;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameWrapper {
            position: relative;
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #2040a0, #4080ff);
        }
        #codeMenu {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #00aaff;
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        input {
            padding: 8px;
            background: #111;
            border: 1px solid #00aaff;
            color: #00ffcc;
            font-family: monospace;
            border-radius: 4px;
            width: 120px;
            text-align: center;
        }
        button.admin-btn {
            padding: 8px 12px;
            background: linear-gradient(135deg, #0055ff, #00aaff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        button.admin-btn:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 10px #00aaff;
        }
    </style>
</head>
<body>

<div id="gameWrapper">
    <div id="codeMenu">
        <input type="text" id="adminCode" placeholder="SECRET CODE">
        <button class="admin-btn" onclick="checkAdminCode()">UNLOCK</button>
    </div>
    <canvas id="gameCanvas" width="1100" height="650"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME STATE ---
let gameState = "MENU"; 
let players = [];
let particles = [];
let boss = null;
let bossTimer = 120; 
let lastTime = Date.now();
let collectedEmeralds = 0;
let screenShake = 0;

const GRAVITY = 0.6;
const FLOOR_Y = 530;

// --- CONTROLS ---
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// --- UI BUTTONS ---
const buttons = {
    play: { x: 425, y: 320, w: 250, h: 55, text: "ENTER BATTLEGROUND" },
    controls: { x: 425, y: 400, w: 250, h: 55, text: "VIEW CONTROLS" },
    backToMenu: { x: 30, y: 30, w: 160, h: 45, text: "↩ MAIN MENU" },
    hyperSonic: { x: 320, y: 340, w: 210, h: 60, text: "HYPER SONIC" },
    darkSonic: { x: 570, y: 340, w: 210, h: 60, text: "DARK SONIC" }
};

// --- PALETTES & CHARACTER CHARACTERISTICS ---
const CHARACTERS = {
    SONIC: { name: "Sonic", baseColor: "#0066ff", superColor: "#ffdd00", speed: 7, jump: -14, maxHp: 100, forms: ["Normal", "Super"] },
    TAILS: { name: "Tails", baseColor: "#ffaa00", superColor: "#ffaa00", speed: 6, jump: -13, maxHp: 90, forms: ["Normal"] },
    SHADOW: { name: "Shadow", baseColor: "#222222", superColor: "#ffffcc", speed: 7, jump: -14, maxHp: 105, forms: ["Normal", "Super"] },
    HYPER: { name: "Hyper Sonic", baseColor: "#ffffff", superColor: "#ffffff", speed: 10, jump: -17, maxHp: 200, forms: ["Hyper"] },
    DARK: { name: "Dark Sonic", baseColor: "#0a0a1a", superColor: "#0a0a1a", speed: 9, jump: -15, maxHp: 160, forms: ["Dark"] }
};

let selectedCharacter = CHARACTERS.SONIC;
let currentForm = "Normal";

// --- PARTICLE SYSTEM ---
class Particle {
    constructor(x, y, vx, vy, color, size, life) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.size = size; this.life = life; this.maxLife = life;
    }
    update() {
        this.x += this.vx; this.y += this.vy; this.life--;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

function spawnBurst(x, y, color, count=8) {
    for(let i=0; i<count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 4 + 2;
        particles.push(new Particle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, color, Math.random()*4+2, 20));
    }
}

// --- MAIN ENTITY ENGINE ---
class Fighter {
    constructor(x, y, charData, isPlayer = false) {
        this.x = x; this.y = y;
        this.w = 40; this.h = 60;
        this.vx = 0; this.vy = 0;
        this.charData = charData;
        this.hp = charData.maxHp;
        this.maxHp = charData.maxHp;
        this.isPlayer = isPlayer;
        this.isDead = false;
        
        this.dir = 1; 
        this.state = "IDLE"; // IDLE, RUN, JUMP, SPINDASH, PUNCH
        this.animTime = 0;
        this.form = charData.forms[0];
        this.color = charData.baseColor;
    }

    update() {
        if (this.isDead) return;
        this.animTime += 0.15;

        // Apply Gravity Environment
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.85; // Friction traction

        // Bound to Green Hill Floor
        if (this.y + this.h >= FLOOR_Y) {
            this.y = FLOOR_Y - this.h;
            this.vy = 0;
            if (this.state === "JUMP") this.state = "IDLE";
        }

        if (this.isPlayer) {
            this.handlePlayerInput();
        } else {
            this.handleAISmartLogic();
        }

        // Handle Active Form Dynamic Visual Shifts
        if (this.isPlayer) {
            this.form = currentForm;
            this.color = (this.form === "Super") ? this.charData.superColor : this.charData.baseColor;
        }

        // Boundary restraints
        this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));

        // FX Generation
        if (this.state === "SPINDASH" && Math.random() < 0.4) {
            particles.push(new Particle(this.x + this.w/2, this.y + this.h, (Math.random()-0.5)*4, -Math.random()*2, "#e69c24", Math.random()*5+2, 15));
        }
        if (this.form === "Super" || this.form === "Hyper" || this.form === "Dark") {
            if(Math.random() < 0.3) {
                let auraColor = this.form === "Super" ? "rgba(255,230,0,0.5)" : this.form === "Hyper" ? "rgba(255,255,255,0.7)" : "rgba(30,0,60,0.6)";
                particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, (Math.random()-0.5)*2, -Math.random()*3, auraColor, Math.random()*6+3, 25));
            }
        }
    }

    handlePlayerInput() {
        let acc = this.charData.speed * 0.18;
        if (keys['Shift']) acc *= 1.5;

        if (keys['a'] || keys['ArrowLeft']) {
            this.vx -= acc; this.dir = -1;
            if (this.vy === 0) this.state = "RUN";
        }
        if (keys['d'] || keys['ArrowRight']) {
            this.vx += acc; this.dir = 1;
            if (this.vy === 0) this.state = "RUN";
        }

        // Fixed Jump assignment mapping to 'w' or ArrowUp
        if ((keys['w'] || keys['ArrowUp']) && this.vy === 0) {
            this.vy = this.charData.jump;
            this.state = "JUMP";
            spawnBurst(this.x+this.w/2, this.y+this.h, "#ffffff", 5);
        }

        if (!keys['a'] && !keys['d'] && !keys['ArrowLeft'] && !keys['ArrowRight'] && this.vy === 0) {
            if (this.state !== "PUNCH" && this.state !== "SPINDASH") this.state = "IDLE";
        }

        if (keys['q']) {
            this.state = "SPINDASH";
            this.vx = this.dir * (this.charData.speed * 1.8);
        }
        if (keys['f']) {
            this.state = "PUNCH";
            this.executeAttack();
        }
    }

    handleAISmartLogic() {
        let closest = null;
        let minDist = 999999;

        players.forEach(p => {
            if (p !== this && !p.isDead) {
                let d = Math.abs(p.x - this.x);
                if (d < minDist) { minDist = d; closest = p; }
            }
        });

        if (closest) {
            let targetDirection = closest.x > this.x ? 1 : -1;
            this.dir = targetDirection;
            
            // Safe Ground Chasing tracking acceleration
            if (minDist > 45) {
                this.vx += targetDirection * (this.charData.speed * 0.12);
                this.state = "RUN";
            } else {
                // Battle Engaged combat threshold
                if (Math.random() < 0.07) {
                    this.state = "PUNCH";
                    this.executeAttack();
                }
            }

            // AI Jump path clearance logic
            if (minDist < 120 && closest.y < this.y - 40 && this.vy === 0 && Math.random() < 0.05) {
                this.vy = this.charData.jump;
                this.state = "JUMP";
            }
        }
    }

    executeAttack() {
        players.forEach(p => {
            if (p !== this && !p.isDead) {
                let distance = Math.hypot((p.x + p.w/2) - (this.x + this.w/2), (p.y + p.h/2) - (this.y + this.h/2));
                if (distance < 65) {
                    let damage = this.state === "SPINDASH" ? 14 : 8;
                    if(this.form !== "Normal") damage *= 1.7; // Enhanced Form Buffs
                    p.takeDamage(damage, this.dir);
                }
            }
        });
        if (boss && !boss.isDead) {
            let distance = Math.hypot((boss.x + boss.w/2) - (this.x + this.w/2), (boss.y + boss.h/2) - (this.y + this.h/2));
            if (distance < 90) boss.takeDamage(12);
        }
    }

    takeDamage(amt, knockDir) {
        this.hp -= amt;
        this.vx += knockDir * 8;
        this.vy -= 4;
        screenShake = 6;
        spawnBurst(this.x+this.w/2, this.y+this.h/2, "#ff3300", 6);

        if (this.hp <= 0) {
            this.hp = 0;
            this.isDead = true;
            spawnBurst(this.x+this.w/2, this.y+this.h/2, this.color, 25);
            setTimeout(() => this.respawn(), 4000);
        }
    }

    respawn() {
        this.hp = this.maxHp;
        this.x = Math.random() * (canvas.width - 200) + 100;
        this.y = 100;
        this.vx = 0; this.vy = 0;
        this.isDead = false;
        this.state = "IDLE";
    }

    draw() {
        if (this.isDead) return;

        ctx.save();
        ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
        if (this.dir === -1) ctx.scale(-1, 1);

        // Rendering Styled Procedural Sonic Models
        ctx.fillStyle = this.color;
        if (this.state === "SPINDASH" || this.state === "JUMP") {
            // Spinball render configuration
            ctx.beginPath();
            let r = 24 + Math.sin(this.animTime * 2) * 2;
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fill();
            // Inner Core Accents
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.beginPath();
            ctx.arc(-4, -4, r/2, 0, Math.PI*2);
            ctx.fill();
        } else {
            // Standard Fighter Shape Anatomy Configuration 
            // Head Spikes
            ctx.beginPath();
            ctx.moveTo(-10, -25); ctx.lineTo(-32, -12); ctx.lineTo(-12, -2);
            ctx.moveTo(-10, -5);  ctx.lineTo(-30, 8);   ctx.lineTo(-8, 14);
            ctx.fill();

            // Torso & Limbs
            ctx.fillRect(-16, -12, 28, 34);
            ctx.fillStyle = "#f3d3b2"; // Peach muzzle/belly skin tone
            ctx.fillRect(-4, -4, 14, 20);

            // Head setup Capsule
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(0, -22, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#f3d3b2";
            ctx.fillRect(4, -24, 14, 12); // Muzzle

            // Running Shoes configuration setup
            ctx.fillStyle = "#e51c23"; // Crimson Red Shoes
            let runCycle = (this.state === "RUN") ? Math.sin(this.animTime) * 10 : 0;
            ctx.fillRect(-18, 22 + runCycle, 16, 12);
            ctx.fillRect(2, 22 - runCycle, 16, 12);
            ctx.fillStyle = "#ffffff"; // Socks/Straps band lines
            ctx.fillRect(-18, 20 + runCycle, 16, 3);
            ctx.fillRect(2, 20 - runCycle, 16, 3);

            if (this.state === "PUNCH") {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(14, -4, 16, 10); // Fist Extended Box extension
            }
        }
        ctx.restore();

        // Overlay Character Names Above Heads
        ctx.fillStyle = this.isPlayer ? "#00ffff" : "#ffffff";
        ctx.font = "bold 13px 'Segoe UI'";
        ctx.shadowColor = "black"; ctx.shadowBlur = 4;
        ctx.textAlign = "center";
        let displayLabel = `${this.charData.name} (${this.form})`;
        ctx.fillText(displayLabel, this.x + this.w/2, this.y - 25);

        // Individual HP bar components setup
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(this.x - 5, this.y - 16, this.w + 10, 6);
        ctx.fillStyle = this.isPlayer ? "#00ffcc" : "#ff3366";
        ctx.fillRect(this.x - 5, this.y - 16, (this.hp / this.maxHp) * (this.w + 10), 6);
        ctx.shadowBlur = 0; // Clear UI bleed attributes
    }
}

// --- EGGMAN SUPREME BOSS BOSS FIGHT ---
class EggmanBoss {
    constructor() {
        this.x = canvas.width / 2 - 60; this.y = 70;
        this.w = 120; this.h = 100;
        this.hp = 600; this.maxHp = 600;
        this.vx = 4; this.isDead = false;
        this.shootCooldown = 0;
    }
    update() {
        this.x += this.vx;
        if(this.x < 60 || this.x > canvas.width - 180) this.vx *= -1;

        this.shootCooldown++;
        if(this.shootCooldown > 45) {
            // Target ground tracking explosions projectiles downward
            players.forEach(p => {
                if(!p.isDead && Math.abs(p.x - (this.x+this.w/2)) < 150) {
                    p.takeDamage(18, p.x > this.x ? 1 : -1);
                }
            });
            this.shootCooldown = 0;
            spawnBurst(this.x + this.w/2, this.y + this.h, "#ffaa00", 12);
        }
    }
    draw() {
        ctx.save();
        ctx.shadowColor = "#ff0044"; ctx.shadowBlur = 15;
        // Eggmobile machine pod body unit lines
        ctx.fillStyle = "#555566";
        ctx.beginPath();
        ctx.arc(this.x + this.w/2, this.y + this.h/2, 50, 0, Math.PI, false);
        ctx.fill();
        ctx.fillStyle = "#cc1133"; // Canopy plating armor
        ctx.fillRect(this.x + 20, this.y + 10, this.w - 40, 40);
        // Eggman Mustache representation box
        ctx.fillStyle = "#ffaa00";
        ctx.fillRect(this.x + 30, this.y + 35, this.w - 60, 10);
        ctx.restore();

        // Mega Boss Health overlay tracker panel elements
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(250, 25, 600, 18);
        ctx.fillStyle = "linear-gradient(to right, #ff0000, #ffaa00)";
        ctx.fillStyle = "#ff0044";
        ctx.fillRect(250, 25, (this.hp / this.maxHp) * 600, 18);
        ctx.strokeStyle = "#ffffff"; ctx.strokeRect(250,25,600,18);
    }
    takeDamage(amt) {
        this.hp -= amt;
        screenShake = 12;
        if (this.hp <= 0) {
            this.isDead = true;
            collectedEmeralds++;
            boss = null;
            // Reward Chaos upgrade adjustments immediately
            players[0].maxHp += 20;
            players[0].hp = players[0].maxHp;
            spawnBurst(this.x+this.w/2, this.y+this.h/2, "#ffff00", 40);
        }
    }
}

// --- FORM SYSTEM INTERCHANGE TOGGLE KEY ACTIONS ---
window.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'e' && gameState === "PLAYING") {
        if(selectedCharacter.forms.length > 1) {
            currentForm = (currentForm === "Normal") ? "Super" : "Normal";
            spawnBurst(players[0].x+20, players[0].y+30, "#ffffff", 15);
        }
    }
});

// --- ADMIN SECURITY VALIDATOR PIN CHECKS ---
function checkAdminCode() {
    if (document.getElementById('adminCode').value === "9217") {
        document.getElementById('codeMenu').style.display = 'none';
        gameState = "CUTSCENE";
        cutsceneTimer = 0;
    } else {
        alert("ACCESS DENIED: INVALID EMERALD EMISSION FREQUENCY.");
    }
}

// --- INITIALIZE ARENA COMBATANTS CONFIGURATIONS ---
function initGameSession() {
    players = [];
    particles = [];
    
    // Spawn User Core Player Instance
    players.push(new Fighter(150, FLOOR_Y - 80, selectedCharacter, true));

    // Spawn 9 balanced AI Ground Fighters
    let pool = [CHARACTERS.SONIC, CHARACTERS.TAILS, CHARACTERS.SHADOW];
    for(let i=0; i<9; i++) {
        let picked = pool[Math.floor(Math.random() * pool.length)];
        players.push(new Fighter(Math.random() * 800 + 150, FLOOR_Y - 80, picked, false));
    }
    boss = null; bossTimer = 120;
}

// --- GUI RENDERING COMPONENT METHOD UTILITIES ---
function renderCoolButton(b) {
    let g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    g.addColorStop(0, "#112244"); g.addColorStop(1, "#001122");
    ctx.fillStyle = g;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = "#00aaff"; ctx.lineWidth = 2;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
    
    ctx.fillStyle = "#00ffff"; ctx.font = "bold 13px monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(b.text, b.x + b.w/2, b.y + b.h/2);
}

// --- CLICK INTERACTION DETECTION CANVAS ---
canvas.addEventListener('mousedown', e => {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left; const my = e.clientY - r.top;

    if (gameState === "MENU") {
        if(mx > buttons.play.x && mx < buttons.play.x+buttons.play.w && my > buttons.play.y && my < buttons.play.y+buttons.play.h) {
            initGameSession(); gameState = "PLAYING";
        }
        if(mx > buttons.controls.x && mx < buttons.controls.x+buttons.controls.w && my > buttons.controls.y && my < buttons.controls.y+buttons.controls.h) {
            gameState = "CONTROLS";
        }
    } else if (gameState === "CONTROLS" || gameState === "ADMIN_MENU" || gameState === "PLAYING") {
        if(mx > buttons.backToMenu.x && mx < buttons.backToMenu.x+buttons.backToMenu.w && my > buttons.backToMenu.y && my < buttons.backToMenu.y+buttons.backToMenu.h) {
            document.getElementById('codeMenu').style.display = 'flex';
            currentForm = "Normal"; selectedCharacter = CHARACTERS.SONIC;
            gameState = "MENU";
        }
        if (gameState === "ADMIN_MENU") {
            if(mx > buttons.hyperSonic.x && mx < buttons.hyperSonic.x+buttons.hyperSonic.w && my > buttons.hyperSonic.y && my < buttons.hyperSonic.y+buttons.hyperSonic.h) {
                selectedCharacter = CHARACTERS.HYPER; currentForm = "Hyper"; initGameSession(); gameState = "PLAYING";
            }
            if(mx > buttons.darkSonic.x && mx < buttons.darkSonic.x+buttons.darkSonic.w && my > buttons.darkSonic.y && my < buttons.darkSonic.y+buttons.darkSonic.h) {
                selectedCharacter = CHARACTERS.DARK; currentForm = "Dark"; initGameSession(); gameState = "PLAYING";
            }
        }
    }
});

// --- SCENERY WORLD DRAW FUNCTIONS (GREEN HILL STYLE) ---
function drawGreenHillStage(time) {
    // Sky gradient setup
    let sky = ctx.createLinearGradient(0,0,0, canvas.height);
    sky.addColorStop(0, "#0044aa"); sky.addColorStop(0.6, "#00aaff"); sky.addColorStop(1, "#88e0ff");
    ctx.fillStyle = sky; ctx.fillRect(0,0,canvas.width, canvas.height);

    // Distant background mountains loops drawing
    ctx.fillStyle = "#22aa44";
    ctx.beginPath();
    for(let i=0; i<=canvas.width; i+=120) {
        ctx.lineTo(i, 420 + Math.sin(i*0.05 + time*0.2)*15);
    }
    ctx.lineTo(canvas.width, FLOOR_Y); ctx.lineTo(0, FLOOR_Y);
    ctx.fill();

    // Checkered Brown dirt structural wall block underneath
    ctx.fillStyle = "#b05020";
    ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height - FLOOR_Y);
    
    // Checkered grids patterns lines overlay
    ctx.fillStyle = "#904018";
    for(let x=0; x<canvas.width; x+=40) {
        for(let y=FLOOR_Y; y<canvas.height; y+=40) {
            if((x+y)/40 % 2 === 0) ctx.fillRect(x, y, 40, 40);
        }
    }

    // Green Grass upper layer line deck trim strip edge configuration
    ctx.fillStyle = "#00cc33"; ctx.fillRect(0, FLOOR_Y, canvas.width, 16);
    ctx.fillStyle = "#009922"; // Striped Grass patterns blocks accents
    for(let x=0; x<canvas.width; x+=30) {
        if(x/30 % 2 === 0) ctx.fillRect(x, FLOOR_Y+16, 15, 10);
    }
}

// --- ENGINE RUN INTERACTIVE MAIN RECURSION LOOPS SYSTEM ---
let cutsceneTimer = 0;
function gameLoop() {
    let now = Date.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;

    ctx.save();
    if(screenShake > 0) {
        let dx = (Math.random() - 0.5) * screenShake;
        let dy = (Math.random() - 0.5) * screenShake;
        ctx.translate(dx, dy);
        screenShake *= 0.9;
    }

    if (gameState === "MENU") {
        drawGreenHillStage(Date.now()*0.001);
        ctx.fillStyle = "#ffffff"; ctx.font = "italic bold 46px Impact";
        ctx.textAlign = "center"; ctx.shadowColor = "#000"; ctx.shadowBlur = 8;
        ctx.fillText("SONIC BATTLE GROUNDS", canvas.width/2, 170);
        ctx.fillText("UNLEASHED", canvas.width/2, 225);
        ctx.shadowBlur = 0;
        renderCoolButton(buttons.play);
        renderCoolButton(buttons.controls);
    } 
    
    else if (gameState === "CONTROLS") {
        drawGreenHillStage(0);
        ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00ffff"; ctx.font = "24px Arial"; ctx.textAlign = "center";
        ctx.fillText("COMBAT INTERFACE SYSTEM PROTOCOLS", canvas.width/2, 120);
        ctx.fillStyle = "#ffffff"; ctx.font = "16px monospace";
        ctx.fillText("A / D or LEFT / RIGHT ARROWS -> Move Horizontal Axes Velocity", canvas.width/2, 200);
        ctx.fillText("W / UP ARROW -> Jump (Engine Gravity Assisted physics)", canvas.width/2, 240);
        ctx.fillText("F KEY -> Strike Melee Punch Jab Combos", canvas.width/2, 280);
        ctx.fillText("Q KEY -> Spin Dash Roll Blitz Charge Attack Mode", canvas.width/2, 320);
        ctx.fillText("E KEY -> Morph Form Transitions Toggle (Sonic & Shadow only)", canvas.width/2, 360);
        renderCoolButton(buttons.backToMenu);
    } 
    
    else if (gameState === "CUTSCENE") {
        cutsceneTimer += 1.5;
        ctx.fillStyle = "#020208"; ctx.fillRect(0,0,canvas.width,canvas.height);
        
        ctx.fillStyle = "#111122"; ctx.fillRect(0, 480, canvas.width, canvas.height - 480);
        let walkX = cutsceneTimer * 2.5;

        // Draw walking admin candidate model 
        ctx.fillStyle = "#0066ff"; ctx.fillRect(walkX, 420, 40, 60);
        ctx.fillStyle = "rgba(255,255,0,0.8)"; // Radiant glowing Halo Ring accent items
        ctx.beginPath(); ctx.arc(walkX + 20, 395, 16, 0, Math.PI*2); ctx.stroke();

        ctx.fillStyle = "#00ffff"; ctx.font = "italic 22px 'Segoe UI'"; ctx.textAlign = "center";
        ctx.fillText("Sonic crosses the boundary gates into the Admin Sanctum...", canvas.width/2, 180);

        if(walkX > canvas.width + 50) gameState = "ADMIN_MENU";
    } 
    
    else if (gameState === "ADMIN_MENU") {
        ctx.fillStyle = "#090014"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#ff00bb"; ctx.font = "bold 32px Impact"; ctx.textAlign = "center";
        ctx.fillText("THE ANCIENT SANCTUM OF INTEL DEVELOPMENT", canvas.width/2, 140);
        renderCoolButton(buttons.hyperSonic);
        renderCoolButton(buttons.darkSonic);
        renderCoolButton(buttons.backToMenu);
    } 
    
    else if (gameState === "PLAYING") {
        bossTimer -= dt;
        if(bossTimer <= 0 && !boss) {
            boss = new EggmanBoss();
        }

        drawGreenHillStage(Date.now()*0.001);

        // Core Game Loops logic updates execution handling processing
        if (boss) { boss.update(); boss.draw(); }
        players.forEach(p => { p.update(); p.draw(); });

        // Particles cycle engines routine
        for(let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if(particles[i].life <= 0) particles.splice(i, 1);
        }

        // Heads Up Dashboard overlay graphics layout configuration text items
        renderCoolButton(buttons.backToMenu);
        ctx.fillStyle = "#000000"; ctx.globalAlpha = 0.4; ctx.fillRect(220, 25, 680, 40); ctx.globalAlpha = 1.0;
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px 'Segoe UI'"; ctx.textAlign = "left";
        ctx.fillText(`OPERATIONAL PROFILE: ${selectedCharacter.name} | FORM STATUS: ${currentForm}`, 240, 48);
        ctx.fillStyle = "#ffff00";
        ctx.fillText(`CHAOS EMERALDS RETRIEVED: ${collectedEmeralds}`, 640, 48);

        if(!boss) {
            ctx.fillStyle = "#ffffff"; ctx.font = "12px monospace"; ctx.textAlign = "center";
            ctx.fillText(`EGGMAN ATTACK CARRIER VECTOR DETECTED IN: ${Math.max(0, Math.floor(bossTimer))} SECONDS`, canvas.width/2, 615);
        }
    }

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

// Ignition process starter loop sequence fire up
gameLoop();
</script>

</body>
</html>
