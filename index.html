<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonic Battle Grounds: Ultimate</title>
    <style>
        body {
            margin: 0;
            background: #050510;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #gameWrapper {
            position: relative;
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #2040a0, #4080ff);
        }
        #codeMenu {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #00aaff;
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        input {
            padding: 6px;
            background: #111;
            border: 1px solid #00aaff;
            color: #00ffcc;
            font-family: monospace;
            border-radius: 4px;
            width: 100px;
            text-align: center;
            font-size: 14px;
        }
        button.admin-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #0055ff, #00aaff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        #mobileControls {
            display: none; 
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            height: 130px;
            pointer-events: none;
            z-index: 20;
        }
        .touch-btn {
            position: absolute;
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(0, 170, 255, 0.4);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
        }
        .touch-btn:active {
            background: rgba(0, 170, 255, 0.4);
            border-color: #00ffff;
            color: #fff;
            transform: scale(1.1);
        }
        #btnLeft  { left: 20px; bottom: 25px; }
        #btnRight { left: 100px; bottom: 25px; }
        #btnPunch { right: 20px; bottom: 50px; background: rgba(255, 50, 50, 0.2); border-color: rgba(255, 50, 50, 0.4); }
        #btnDash  { right: 95px; bottom: 65px; background: rgba(230, 150, 30, 0.2); border-color: rgba(230, 150, 30, 0.4); font-size: 14px; }
        #btnJump  { right: 40px; bottom: -15px; background: rgba(0, 255, 100, 0.2); border-color: rgba(0, 255, 100, 0.4); }
    </style>
</head>
<body>

<div id="gameWrapper">
    <div id="codeMenu">
        <input type="text" id="adminCode" placeholder="CODE">
        <button class="admin-btn" onclick="checkAdminCode()">UNLOCK</button>
    </div>
    
    <div id="mobileControls">
        <div class="touch-btn" id="btnLeft">◀</div>
        <div class="touch-btn" id="btnRight">▶</div>
        <div class="touch-btn" id="btnDash">DASH</div>
        <div class="touch-btn" id="btnPunch">F</div>
        <div class="touch-btn" id="btnJump">W</div>
    </div>

    <canvas id="gameCanvas" width="1100" height="650"></canvas>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- GAME MODE AND CAMPAIGN STATE ---
let gameState = "MENU"; 
let gameMode = "BATTLEGROUND"; 
let currentStoryLevel = 1;
let totalLevelsInWave = 4;

let players = [];
let particles = [];
let boss = null;
let bossTimer = 45; 
let lastTime = Date.now();
let collectedEmeralds = 0;
let screenShake = 0;

const GRAVITY = 0.6;
const FLOOR_Y = 530;

// --- CONTROLS: UNIFIED SCANNING MATRIX ---
const keys = {};
window.addEventListener('keydown', e => {
    let k = e.key.toLowerCase();
    keys[k] = true;
    keys[e.key] = true;
});
window.addEventListener('keyup', e => {
    let k = e.key.toLowerCase();
    keys[k] = false;
    keys[e.key] = false;
});
window.addEventListener('blur', () => {
    for (let k in keys) keys[k] = false;
});

// --- MOBILE CONTROLS CRITICAL STABILIZATION FIX ---
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
if (isMobile) {
    document.getElementById('mobileControls').style.display = 'block';
}
function setupMobileButton(elementId, keyName) {
    const btn = document.getElementById(elementId);
    
    btn.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        keys[keyName.toLowerCase()] = true; 
        keys[keyName] = true; 
    });
    
    btn.addEventListener('touchend', (e) => { 
        e.preventDefault(); 
        keys[keyName.toLowerCase()] = false; 
        keys[keyName] = false; 
    });

    btn.addEventListener('touchcancel', (e) => { 
        e.preventDefault(); 
        keys[keyName.toLowerCase()] = false; 
        keys[keyName] = false; 
    });
}
setupMobileButton('btnLeft', 'ArrowLeft');
setupMobileButton('btnRight', 'ArrowRight');
setupMobileButton('btnJump', 'ArrowUp');
setupMobileButton('btnPunch', 'f');
setupMobileButton('btnDash', 'q');

// --- CHARACTER METRICS & PROGRESSION LOCKS ---
const CHARACTERS = {
    SONIC: { name: "Sonic", baseColor: "#0066ff", superColor: "#ffdd00", speed: 7, jump: -20, maxHp: 100, forms: ["Normal", "Super"], unlocked: true },
    TAILS: { name: "Tails", baseColor: "#ffaa00", superColor: "#ffdd00", speed: 6.2, jump: -19.5, maxHp: 95, forms: ["Normal"], unlocked: false },
    KNUCKLES: { name: "Knuckles", baseColor: "#ff2222", superColor: "#ffaaaa", speed: 6.5, jump: -19, maxHp: 120, forms: ["Normal"], unlocked: false },
    SHADOW: { name: "Shadow", baseColor: "#222222", superColor: "#ffffcc", speed: 7.5, jump: -20.5, maxHp: 110, forms: ["Normal", "Super"], unlocked: false },
    METAL_SONIC: { name: "Metal Sonic", baseColor: "#0044cc", superColor: "#3388ff", speed: 8.5, jump: -22, maxHp: 150, forms: ["Normal", "Overdrive"], unlocked: false },
    BADNIK: { name: "Badnik Motobug", baseColor: "#dd2222", superColor: "#dd2222", speed: 4, jump: -14, maxHp: 50, forms: ["Normal"], unlocked: false },
    HYPER: { name: "Hyper Sonic", baseColor: "#ffffff", superColor: "#ffffff", speed: 10, jump: -24, maxHp: 200, forms: ["Hyper"], unlocked: true },
    DARK: { name: "Dark Sonic", baseColor: "#0a0a1a", superColor: "#0a0a1a", speed: 9, jump: -22, maxHp: 160, forms: ["Dark"], unlocked: true }
};

let selectedCharacter = CHARACTERS.SONIC;
let currentForm = "Normal";
const EMERALD_COLORS = ["#ff0000", "#00ff00", "#0000ff", "#ffff00", "#ff00ff", "#00ffff", "#ffffff"];

// --- NAVIGATION MENU BUTTON OBJECTS ---
const buttons = {
    play: { x: 425, y: 260, w: 250, h: 48, text: "FREE BATTLEGROUND" },
    story: { x: 425, y: 320, w: 250, h: 48, text: "STORY CAMPAIGN" },
    switchChar: { x: 425, y: 380, w: 250, h: 48, text: "SWITCH CHARACTER" },
    controls: { x: 425, y: 440, w: 250, h: 48, text: "VIEW CONTROLS" },
    backToMenu: { x: 15, y: 12, w: 120, h: 32, text: "↩ MENU" }
};

function getUnlockedPool() {
    let pool = [];
    if (CHARACTERS.SONIC.unlocked) pool.push(CHARACTERS.SONIC);
    if (CHARACTERS.TAILS.unlocked) pool.push(CHARACTERS.TAILS);
    if (CHARACTERS.KNUCKLES.unlocked) pool.push(CHARACTERS.KNUCKLES);
    if (CHARACTERS.SHADOW.unlocked) pool.push(CHARACTERS.SHADOW);
    if (CHARACTERS.METAL_SONIC.unlocked) pool.push(CHARACTERS.METAL_SONIC);
    return pool;
}

// --- PARTICLE ENGINE ---
class Particle {
    constructor(x, y, vx, vy, color, size, life) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.color = color; this.size = size; this.life = life; this.maxLife = life;
    }
    update() { this.x += this.vx; this.y += this.vy; this.life--; }
    draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life / this.maxLife;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}
function spawnBurst(x, y, color, count=8) {
    for(let i=0; i<count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 4 + 2;
        particles.push(new Particle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed, color, Math.random()*4+2, 20));
    }
}

// --- FIGHTER CORE ENGINE ---
class Fighter {
    constructor(x, y, charData, isPlayer = false) {
        this.x = x; this.y = y; this.w = 40; this.h = 60;
        this.vx = 0; this.vy = 0;
        this.charData = charData;
        this.hp = charData.maxHp;
        this.maxHp = charData.maxHp;
        this.isPlayer = isPlayer;
        this.isDead = false;
        this.dir = 1; 
        this.state = "IDLE";
        this.animTime = 0;
        this.form = "Normal";
        this.color = charData.baseColor;
    }

    update() {
        if (this.isDead) return;
        this.animTime += 0.15;

        this.vy += GRAVITY;
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.85;

        if (this.y + this.h >= FLOOR_Y) {
            this.y = FLOOR_Y - this.h;
            this.vy = 0;
            if (this.state === "JUMP") this.state = "IDLE";
        }

        if (this.isPlayer) this.handlePlayerInput();
        else this.handleAISmartLogic();

        if (this.isPlayer) {
            this.form = currentForm;
            this.color = (this.form === "Super" || this.form === "Hyper" || this.form === "Overdrive") ? this.charData.superColor : this.charData.baseColor;
        }

        this.x = Math.max(0, Math.min(canvas.width - this.w, this.x));

        if (this.state === "SPINDASH" && Math.random() < 0.4) {
            particles.push(new Particle(this.x + this.w/2, this.y + this.h, (Math.random()-0.5)*4, -Math.random()*2, "#e69c24", Math.random()*5+2, 15));
        }
        if (this.form === "Super" || this.form === "Hyper" || this.form === "Dark" || this.form === "Overdrive") {
            if(Math.random() < 0.3) {
                let auraColor = (this.form === "Super" || this.form === "Overdrive") ? "rgba(255,230,0,0.5)" : this.form === "Hyper" ? "rgba(255,255,255,0.7)" : "rgba(30,0,60,0.6)";
                particles.push(new Particle(this.x + Math.random()*this.w, this.y + Math.random()*this.h, (Math.random()-0.5)*2, -Math.random()*3, auraColor, Math.random()*6+3, 25));
            }
        }
    }

    handlePlayerInput() {
        let acc = this.charData.speed * 0.18;
        if (this.form !== "Normal") acc *= 1.4;

        let leftPressed = keys['a'] || keys['arrowleft'];
        let rightPressed = keys['d'] || keys['arrowright'];
        let jumpPressed = keys['w'] || keys['arrowup'];

        if (leftPressed) {
            this.vx -= acc; this.dir = -1;
            if (this.vy === 0) this.state = "RUN";
        }
        if (rightPressed) {
            this.vx += acc; this.dir = 1;
            if (this.vy === 0) this.state = "RUN";
        }
        if (jumpPressed && this.vy === 0) {
            this.vy = this.form !== "Normal" ? this.charData.jump - 2 : this.charData.jump; 
            this.state = "JUMP";
            spawnBurst(this.x+this.w/2, this.y+this.h, "#ffffff", 5);
        }
        if (!leftPressed && !rightPressed && this.vy === 0) {
            if (this.state !== "PUNCH" && this.state !== "SPINDASH") this.state = "IDLE";
        }
        if (keys['q']) {
            this.state = "SPINDASH"; 
            let dashFactor = this.form !== "Normal" ? 2.4 : 1.8;
            this.vx = this.dir * (this.charData.speed * dashFactor);
        }
        if (keys['f']) {
            this.state = "PUNCH"; this.executeAttack();
        }
    }

    handleAISmartLogic() {
        let closest = null; let minDist = 999999;
        
        if (gameMode === "STORY") {
            closest = players[0];
            if (closest) minDist = Math.abs(closest.x - this.x);
        } else {
            players.forEach(p => {
                if (p !== this && !p.isDead) {
                    let d = Math.abs(p.x - this.x);
                    if (d < minDist) { minDist = d; closest = p; }
                }
            });
        }

        if (closest && !closest.isDead) {
            let targetDirection = closest.x > this.x ? 1 : -1;
            this.dir = targetDirection;
            
            if (minDist > 45) {
                this.vx += targetDirection * (this.charData.speed * 0.12);
                this.state = "RUN";
            } else {
                if (Math.random() < 0.07) { this.state = "PUNCH"; this.executeAttack(); }
            }
            if (minDist < 120 && closest.y < this.y - 40 && this.vy === 0 && Math.random() < 0.05) {
                this.vy = this.charData.jump; this.state = "JUMP";
            }
        }
    }

    executeAttack() {
        let reach = this.charData.name === "Knuckles" ? 75 : 65; 
        players.forEach(p => {
            if (p !== this && !p.isDead) {
                let distance = Math.hypot((p.x + p.w/2) - (this.x + this.w/2), (p.y + p.h/2) - (this.y + this.h/2));
                if (distance < reach) {
                    let damage = this.state === "SPINDASH" ? 14 : 8;
                    if (this.charData.name === "Knuckles" && this.state === "PUNCH") damage = 15; 
                    if (this.charData.name === "Metal Sonic") damage = 12; 
                    if (this.form !== "Normal") damage *= 2.0; 
                    p.takeDamage(damage, this.dir);
                }
            }
        });
        
        if (boss && !boss.isDead) {
            let pCenterX = this.x + this.w / 2;
            let bCenterX = boss.x + boss.w / 2;
            
            if (Math.abs(pCenterX - bCenterX) < (boss.w / 2 + 30) && this.y < (boss.y + boss.h + 80)) {
                let pDmg = this.charData.name === "Knuckles" ? 22 : 12;
                boss.takeDamage(this.form !== "Normal" ? pDmg * 2 : pDmg);
            }
        }
    }

    takeDamage(amt, knockDir) {
        if (this.isPlayer && this.form !== "Normal" && Math.random() < 0.5) return; 
        this.hp -= amt; this.vx += knockDir * 8; this.vy -= 4;
        screenShake = 6;
        spawnBurst(this.x+this.w/2, this.y+this.h/2, "#ff3300", 6);
        if (this.hp <= 0) {
            this.hp = 0; this.isDead = true;
            spawnBurst(this.x+this.w/2, this.y+this.h/2, this.color, 25);
            
            if (this.isPlayer && gameMode === "STORY") {
                setTimeout(() => { alert("LEVEL FAILED! Prepare to retry."); initStoryLevel(); }, 1500);
            } else {
                setTimeout(() => this.respawn(), 4000);
            }
        }
        if (!this.isPlayer && this.hp <= 0 && gameMode === "STORY" && !boss) {
            checkStoryProgress();
        }
    }

    respawn() {
        this.hp = this.maxHp; this.x = Math.random() * (canvas.width - 200) + 100;
        this.y = 100; this.vx = 0; this.vy = 0; this.isDead = false; this.state = "IDLE";
    }

    draw() {
        if (this.isDead) return;
        ctx.save();
        ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
        if (this.dir === -1) ctx.scale(-1, 1);

        if (this.charData.name === "Badnik Motobug") {
            ctx.fillStyle = "#cc1122";
            ctx.fillRect(-18, -10, 36, 26); 
            ctx.fillStyle = "#ffee00";
            ctx.beginPath(); ctx.arc(14, -4, 5, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#555555";
            ctx.beginPath(); ctx.arc(0, 18, 10, 0, Math.PI*2); ctx.fill(); 
            ctx.fillStyle = "#111111";
            ctx.beginPath(); ctx.arc(0, 18, 5, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.fillStyle = this.color;
            if (this.state === "SPINDASH" || this.state === "JUMP") {
                ctx.beginPath(); let r = 24 + Math.sin(this.animTime * 2) * 2;
                ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.beginPath(); ctx.arc(-4, -4, r/2, 0, Math.PI*2); ctx.fill();
            } else {
                ctx.beginPath(); 
                ctx.moveTo(-10, -25); ctx.lineTo(-34, -15); ctx.lineTo(-12, -4); 
                ctx.moveTo(-10, -5); ctx.lineTo(-32, 6); ctx.lineTo(-8, 14);
                ctx.moveTo(-12, -15); ctx.lineTo(-36, -3); ctx.lineTo(-10, 5);
                ctx.fill();
                
                ctx.fillRect(-16, -12, 28, 34); 
                
                if(this.charData.name === "Metal Sonic") {
                    ctx.fillStyle = "#222233"; ctx.fillRect(-4, -4, 14, 20);
                } else {
                    ctx.fillStyle = "#f3d3b2"; ctx.fillRect(-4, -4, 14, 20);
                }

                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, -22, 18, 0, Math.PI * 2); ctx.fill();
                
                ctx.beginPath(); ctx.moveTo(-12, -36); ctx.lineTo(-20, -48); ctx.lineTo(-2, -38); ctx.fill();

                if (this.charData.name === "Metal Sonic") {
                    ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(6, -20, 3, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.fillStyle = "#f3d3b2"; ctx.fillRect(4, -24, 14, 12); 
                }

                ctx.fillStyle = this.charData.name === "Knuckles" ? "#ffffff" : "#e51c23"; 
                if(this.charData.name === "Metal Sonic") ctx.fillStyle = "#555555";

                let runCycle = (this.state === "RUN") ? Math.sin(this.animTime) * 10 : 0;
                ctx.fillRect(-18, 22 + runCycle, 16, 12); ctx.fillRect(2, 22 - runCycle, 16, 12);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(-18, 20 + runCycle, 16, 3); ctx.fillRect(2, 20 - runCycle, 16, 3);
                if (this.state === "PUNCH") { ctx.fillStyle = "#ffffff"; ctx.fillRect(14, -4, 16, 10); }
            }
        }
        ctx.restore();

        ctx.fillStyle = this.isPlayer ? "#00ffff" : "#ffaaaa";
        ctx.font = "bold 13px 'Segoe UI'"; ctx.shadowColor = "black"; ctx.shadowBlur = 4; ctx.textAlign = "center";
        ctx.fillText(`${this.charData.name}`, this.x + this.w/2, this.y - 25);

        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(this.x - 5, this.y - 16, this.w + 10, 6);
        ctx.fillStyle = this.isPlayer ? "#00ffcc" : "#ff3366"; ctx.fillRect(this.x - 5, this.y - 16, (this.hp / this.maxHp) * (this.w + 10), 6);
        ctx.shadowBlur = 0; 
    }
}

// --- STORY CAMPAIGN AND DYNAMIC BOSSES ---
class CampaignBoss {
    constructor(type) {
        this.type = type; 
        this.w = type === "EGGMAN" ? 120 : 40;
        this.h = type === "EGGMAN" ? 100 : 60;
        this.x = canvas.width / 2 - this.w/2; 
        this.y = type === "EGGMAN" ? 120 : FLOOR_Y - this.h; 
        this.vx = type === "EGGMAN" ? 4.5 : type === "METAL_SONIC" ? 7.5 : 5.5;
        this.vy = 0;
        this.dir = 1;
        this.isDead = false;
        this.shootCooldown = 0;
        this.animTime = 0;
        
        if (type === "EGGMAN") { this.hp = 500; this.maxHp = 500; }
        else if (type === "KNUCKLES") { this.hp = 650; this.maxHp = 650; }
        else if (type === "SHADOW") { this.hp = 800; this.maxHp = 800; }
        else if (type === "METAL_SONIC") { this.hp = 1000; this.maxHp = 1000; }
    }

    update() {
        this.animTime += 0.15;
        this.x += this.vx;
        
        if (this.type === "EGGMAN") {
            if(this.x < 60 || this.x > canvas.width - 180) this.vx *= -1;
            this.shootCooldown++;
            if(this.shootCooldown > 40) {
                let target = players[0];
                if(target && !target.isDead && Math.abs(target.x - (this.x+this.w/2)) < 200) {
                    target.takeDamage(20, target.x > this.x ? 1 : -1);
                }
                this.shootCooldown = 0; spawnBurst(this.x + this.w/2, this.y + this.h, "#ffcc00", 12);
            }
        } else {
            let target = players[0];
            if (target) {
                let targetDir = target.x > this.x ? 1 : -1;
                this.vx = targetDir * Math.abs(this.vx);
                this.dir = targetDir;
                
                if (Math.abs(target.x - this.x) < 75) {
                    this.shootCooldown++;
                    if(this.shootCooldown > 18) {
                        let force = this.type === "SHADOW" ? 18 : this.type === "METAL_SONIC" ? 22 : 24;
                        target.takeDamage(force, this.dir);
                        this.shootCooldown = 0;
                    }
                }
            }
            if(this.x < 50 || this.x > canvas.width - 90) this.vx *= -1;
        }
    }

    draw() {
        ctx.save();
        if (this.type === "EGGMAN") {
            ctx.shadowColor = "#ff0044"; ctx.shadowBlur = 15;
            ctx.fillStyle = "#555566"; ctx.beginPath(); ctx.arc(this.x + this.w/2, this.y + this.h/2, 50, 0, Math.PI, false); ctx.fill();
            ctx.fillStyle = "#cc1133"; ctx.fillRect(this.x + 20, this.y + 10, this.w - 40, 40);
            ctx.fillStyle = "#ffaa00"; ctx.fillRect(this.x + 30, this.y + 35, this.w - 60, 10);
            ctx.fillStyle = "#ffffff"; ctx.font = "11px monospace"; ctx.fillText("JUMP ATTACK UNDERNEATH ME!", this.x-20, this.y - 10);
        } else {
            ctx.translate(this.x + this.w/2, this.y + this.h/2);
            if (this.dir === -1) ctx.scale(-1, 1);
            
            let bColor = this.type === "KNUCKLES" ? "#ff2222" : this.type === "SHADOW" ? "#222222" : "#0044cc";
            ctx.fillStyle = bColor;
            
            ctx.beginPath();
            ctx.moveTo(-10, -25); ctx.lineTo(-36, -16); ctx.lineTo(-12, -4);
            ctx.moveTo(-10, -5); ctx.lineTo(-34, 7); ctx.lineTo(-8, 14);
            ctx.moveTo(-12, -14); ctx.lineTo(-38, -2); ctx.lineTo(-10, 6);
            ctx.fill();
            
            ctx.fillRect(-16, -12, 28, 34);
            ctx.beginPath(); ctx.arc(0, -22, 18, 0, Math.PI * 2); ctx.fill();
            
            ctx.beginPath(); ctx.moveTo(-10, -36); ctx.lineTo(-18, -48); ctx.lineTo(-1, -38); ctx.fill();
            
            if(this.type === "METAL_SONIC") {
                ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(6, -21, 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#111111"; ctx.fillRect(4, -8, 10, 8);
            } else {
                ctx.fillStyle = "#ffffff"; ctx.fillRect(6, -8, 12, 10); 
            }
        }
        ctx.restore();

        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(350, 50, 400, 12);
        ctx.fillStyle = "#ff0044"; 
        ctx.fillRect(350, 50, (this.hp / this.maxHp) * 400, 12);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px monospace"; ctx.textAlign = "center";
        ctx.fillText(`BOSS: ${this.type.replace('_', ' ')}`, 550, 44);
    }

    takeDamage(amt) {
        this.hp -= amt; screenShake = 12;
        spawnBurst(this.x + this.w/2, this.y + this.h/2, "#ffcc00", 8);
        if (this.hp <= 0) {
            this.isDead = true;
            boss = null;
            spawnBurst(this.x+this.w/2, this.y+this.h/2, "#ffff00", 40);
            
            activeCinematicType = this.type;
            gameState = "STORY_CINEMATIC";
            cinematicFrameTimer = 0;
        }
    }
}

// --- IMMERSIVE CINEMATIC STORY CRAWLER STATES ---
let activeCinematicType = "";
let cinematicFrameTimer = 0;

function drawStoryCinematicScene() {
    cinematicFrameTimer++;
    ctx.fillStyle = "#02020a"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    ctx.fillStyle = "#000000"; ctx.fillRect(0, 0, canvas.width, 90); ctx.fillRect(0, canvas.height-90, canvas.width, 90);
    ctx.strokeStyle = "#00aaff"; ctx.lineWidth = 2; ctx.strokeRect(0, 90, canvas.width, canvas.height-180);

    ctx.textAlign = "center";
    
    if (activeCinematicType === "EGGMAN") {
        ctx.fillStyle = "#00ffcc"; ctx.font = "bold 28px Impact"; ctx.fillText("CHAPTER 1 COMPLETE: THE RESCUE", canvas.width/2, 150);
        ctx.fillStyle = "#ffffff"; ctx.font = "16px monospace";
        ctx.fillText("Eggman's flying carrier bursts into flames and flees the arena airspace...", canvas.width/2, 230);
        ctx.fillText("With a heavy smash, the containment pod shatters open on the floor fields.", canvas.width/2, 270);
        ctx.fillStyle = "#ffaa00"; ctx.font = "bold 18px 'Segoe UI'";
        ctx.fillText("Tails: 'Thanks Sonic! Eggman had my lab completely locked down. Let's finish this!'", canvas.width/2, 340);
        ctx.fillStyle = "#ffff00"; ctx.fillText("[ MILESTONE UNLOCKED: TAILS IS NOW PLAYABLE! ]", canvas.width/2, 430);
    } 
    else if (activeCinematicType === "KNUCKLES") {
        ctx.fillStyle = "#ff3333"; ctx.font = "bold 28px Impact"; ctx.fillText("CHAPTER 2 COMPLETE: SHATTERED ILLUSIONS", canvas.width/2, 150);
        ctx.fillStyle = "#ffffff"; ctx.font = "16px monospace";
        ctx.fillText("Knuckles stumbles back, holding his head as the trickery field dissipates.", canvas.width/2, 230);
        ctx.fillText("Realizing he was tricked by Eggman into attacking his lifelong allies,", canvas.width/2, 270);
        ctx.fillText("the Guardian slams his spiked fists together, swearing absolute vengeance.", canvas.width/2, 310);
        ctx.fillStyle = "#ff8888"; ctx.font = "bold 18px 'Segoe UI'";
        ctx.fillText("Knuckles: 'I was blinded by anger... I won't let him escape with the Master Emerald!'", canvas.width/2, 370);
        ctx.fillStyle = "#ffff00"; ctx.fillText("[ MILESTONE UNLOCKED: KNUCKLES IS NOW PLAYABLE! ]", canvas.width/2, 440);
    } 
    else if (activeCinematicType === "SHADOW") {
        ctx.fillStyle = "#ffffcc"; ctx.font = "bold 28px Impact"; ctx.fillText("CHAPTER 3 COMPLETE: THE ULTIMATE ACKNOWLEDGMENT", canvas.width/2, 150);
        ctx.fillStyle = "#ffffff"; ctx.font = "16px monospace";
        ctx.fillText("Chaos Control sparkles dissolve into thin air as Shadow drops his guard.", canvas.width/2, 230);
        ctx.fillText("The shockwaves of the ultimate speed clash echo across the shattering sanctum.", canvas.width/2, 270);
        ctx.fillStyle = "#aaaaaa"; ctx.font = "bold 18px 'Segoe UI'";
        ctx.fillText("Shadow: 'Your speed... it matches my internal engine capacity. Very well. Let's end his legacy.'", canvas.width/2, 350);
        ctx.fillStyle = "#ffff00"; ctx.fillText("[ MILESTONE UNLOCKED: SHADOW IS NOW PLAYABLE! ]", canvas.width/2, 430);
    }
    else if (activeCinematicType === "METAL_SONIC") {
        ctx.fillStyle = "#33aaee"; ctx.font = "bold 28px Impact"; ctx.fillText("GRAND FINALE: REWRITING THE CODE", canvas.width/2, 150);
        ctx.fillStyle = "#ffffff"; ctx.font = "16px monospace";
        ctx.fillText("Metal Sonic's optical sensors flicker wildly as internal circuits overload.", canvas.width/2, 230);
        ctx.fillText("Instead of detonating, his primary core overrides Eggman's master logic array.", canvas.width/2, 270);
        ctx.fillText("Standing tall, the hyper-engineered marvel looks at you as an independent rival.", canvas.width/2, 310);
        ctx.fillStyle = "#44bbff"; ctx.font = "bold 18px 'Segoe UI'";
        ctx.fillText("System Output: 'ERROR... EGGMAN PROTOCOLS ERASED. FREE WILL INITIALIZED.'", canvas.width/2, 370);
        ctx.fillStyle = "#ffff00"; ctx.fillText("[ ULTIMATE UNLOCK: METAL SONIC IS NOW PLAYABLE WITH MAXIMUM STRENGTH! ]", canvas.width/2, 440);
    }

    ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.font = "12px monospace";
    ctx.fillText("CLICK ANYWHERE ON SCREEN TO CONTINUE ADVENTURE", canvas.width/2, canvas.height - 40);
}

function resolveCinematicExit() {
    if (activeCinematicType === "EGGMAN") {
        CHARACTERS.TAILS.unlocked = true;
    } else if (activeCinematicType === "KNUCKLES") {
        CHARACTERS.KNUCKLES.unlocked = true;
    } else if (activeCinematicType === "SHADOW") {
        CHARACTERS.SHADOW.unlocked = true;
    } else if (activeCinematicType === "METAL_SONIC") {
        CHARACTERS.METAL_SONIC.unlocked = true;
    }
    
    currentStoryLevel++;
    if (currentStoryLevel > 16) {
        alert("CONGRATULATIONS! You have fully conquered all 16 levels of the Campaign Story Mode!");
        currentStoryLevel = 1;
        gameState = "MENU";
    } else {
        initStoryLevel();
        gameState = "PLAYING";
    }
}

function checkStoryProgress() {
    let aliveBots = players.filter(p => !p.isPlayer && !p.isDead).length;
    if (aliveBots === 0 && !boss) {
        currentStoryLevel++;
        if(currentStoryLevel > 16) {
            alert("CONGRATULATIONS! Campaign Complete!");
            currentStoryLevel = 1;
            gameState = "MENU";
        } else {
            alert(`LEVEL CLEAR! Advancing to Level ${currentStoryLevel}`);
            initStoryLevel();
        }
    }
}

// --- SESSION INITIALIZATION SYSTEMS ---
function initGameSession() {
    gameMode = "BATTLEGROUND";
    players = []; particles = []; currentForm = "Normal";
    players.push(new Fighter(150, FLOOR_Y - 80, selectedCharacter, true));
    
    let activePool = getUnlockedPool();
    for(let i=0; i<4; i++) {
        let picked = activePool[Math.floor(Math.random() * activePool.length)];
        players.push(new Fighter(Math.random() * 800 + 150, FLOOR_Y - 80, picked, false));
    }
    boss = null; bossTimer = 45;
}

function initStoryLevel() {
    gameMode = "STORY";
    players = []; particles = []; boss = null;
    players.push(new Fighter(150, FLOOR_Y - 80, selectedCharacter, true));

    if (currentStoryLevel === 4) {
        boss = new CampaignBoss("EGGMAN");
    } else if (currentStoryLevel === 8) {
        boss = new CampaignBoss("KNUCKLES");
    } else if (currentStoryLevel === 12) {
        boss = new CampaignBoss("SHADOW");
    } else if (currentStoryLevel === 16) {
        boss = new CampaignBoss("METAL_SONIC");
    } else {
        let minionCount = currentStoryLevel > 12 ? 4 : 3; 
        for(let i=0; i<minionCount; i++) {
            players.push(new Fighter(Math.random() * 600 + 300, FLOOR_Y - 80, CHARACTERS.BADNIK, false));
        }
    }
}

// --- ADMIN VERIFIER ---
function checkAdminCode() {
    if (document.getElementById('adminCode').value === "9217") {
        document.getElementById('codeMenu').style.display = 'none';
        gameState = "ADMIN_MENU";
    } else {
        alert("ACCESS DENIED: INVALID FREQUENCY SPECIFICATION.");
    }
}

function renderCoolButton(b) {
    let g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    g.addColorStop(0, "#112244"); g.addColorStop(1, "#001122");
    ctx.fillStyle = g; ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = "#00aaff"; ctx.lineWidth = 2; ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = "#00ffff"; ctx.font = "bold 13px monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(b.text, b.x + b.w/2, b.y + b.h/2);
}

// --- CANVAS INTERACTION ROUTINE HANDLERS ---
canvas.addEventListener('mousedown', handleClicks);
function handleClicks(e) {
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left; const my = e.clientY - r.top;

    if (gameState === "STORY_CINEMATIC" && cinematicFrameTimer > 30) {
        resolveCinematicExit();
        return;
    }

    if (gameState === "MENU") {
        if(mx > buttons.play.x && mx < buttons.play.x+buttons.play.w && my > buttons.play.y && my < buttons.play.y+buttons.play.h) {
            collectedEmeralds = 0; initGameSession(); gameState = "PLAYING";
        }
        if(mx > buttons.story.x && mx < buttons.story.x+buttons.story.w && my > buttons.story.y && my < buttons.story.y+buttons.story.h) {
            initStoryLevel(); gameState = "PLAYING";
        }
        if(mx > buttons.switchChar.x && mx < buttons.switchChar.x+buttons.switchChar.w && my > buttons.switchChar.y && my < buttons.switchChar.y+buttons.switchChar.h) {
            let unlockedPool = getUnlockedPool();
            let currentIdx = unlockedPool.indexOf(selectedCharacter);
            let nextIdx = (currentIdx + 1) % unlockedPool.length;
            selectedCharacter = unlockedPool[nextIdx];
        }
        if(mx > buttons.controls.x && mx < buttons.controls.x+buttons.controls.w && my > buttons.controls.y && my < buttons.controls.y+buttons.controls.h) {
            gameState = "CONTROLS";
        }
    } else if (gameState === "CONTROLS" || gameState === "ADMIN_MENU" || gameState === "PLAYING") {
        if(mx > buttons.backToMenu.x && mx < buttons.backToMenu.x+buttons.backToMenu.w && my > buttons.backToMenu.y && my < buttons.backToMenu.y+buttons.backToMenu.h) {
            document.getElementById('codeMenu').style.display = 'flex';
            currentForm = "Normal"; 
            let unlockedPool = getUnlockedPool();
            if(unlockedPool.indexOf(selectedCharacter) === -1) selectedCharacter = CHARACTERS.SONIC;
            gameState = "MENU";
        }
    }
}

function drawGreenHillStage(time) {
    let sky = ctx.createLinearGradient(0,0,0, canvas.height);
    sky.addColorStop(0, "#0044aa"); sky.addColorStop(0.6, "#00aaff"); sky.addColorStop(1, "#88e0ff");
    ctx.fillStyle = sky; ctx.fillRect(0,0,canvas.width, canvas.height);

    ctx.fillStyle = "#22aa44"; ctx.beginPath();
    for(let i=0; i<=canvas.width; i+=120) ctx.lineTo(i, 420 + Math.sin(i*0.05 + time*0.2)*15);
    ctx.lineTo(canvas.width, FLOOR_Y); ctx.lineTo(0, FLOOR_Y); ctx.fill();

    ctx.fillStyle = "#b05020"; ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height - FLOOR_Y);
    ctx.fillStyle = "#904018";
    for(let x=0; x<canvas.width; x+=40) {
        for(let y=FLOOR_Y; y<canvas.height; y+=40) if((x+y)/40 % 2 === 0) ctx.fillRect(x, y, 40, 40);
    }
    ctx.fillStyle = "#00cc33"; ctx.fillRect(0, FLOOR_Y, canvas.width, 16);
    ctx.fillStyle = "#009922"; 
    for(let x=0; x<canvas.width; x+=30) if(x/30 % 2 === 0) ctx.fillRect(x, FLOOR_Y+16, 15, 10);
}

// --- MAIN GRAPHICS SYSTEM LOOP ---
let superCutsceneTimer = 0;

function gameLoop() {
    let now = Date.now(); let dt = (now - lastTime) / 1000; lastTime = now;
    ctx.save();
    if(screenShake > 0) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake); screenShake *= 0.9;
    }

    if (gameState === "MENU") {
        drawGreenHillStage(Date.now()*0.001);
        ctx.fillStyle = "#ffffff"; ctx.font = "italic bold 46px Impact"; ctx.textAlign = "center";
        ctx.fillText("SONIC BATTLE GROUNDS", canvas.width/2, 115); ctx.fillText("UNLEASHED", canvas.width/2, 165);
        ctx.fillStyle = "#00ffcc"; ctx.font = "bold 13px monospace";
        ctx.fillText(`EQUIPPED FIGHTER: ${selectedCharacter.name.toUpperCase()}`, canvas.width/2, 220);

        renderCoolButton(buttons.play);
        renderCoolButton(buttons.story);
        renderCoolButton(buttons.switchChar);
        renderCoolButton(buttons.controls);
    } 
    else if (gameState === "STORY_CINEMATIC") {
        drawStoryCinematicScene();
    }
    else if (gameState === "CONTROLS") {
        drawGreenHillStage(0); ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00ffff"; ctx.font = "24px Arial"; ctx.textAlign = "center";
        ctx.fillText("COMBAT INTERFACE SYSTEM PROTOCOLS", canvas.width/2, 120);
        ctx.fillStyle = "#ffffff"; ctx.font = "16px monospace";
        ctx.fillText("A / D or LEFT / RIGHT ARROWS -> Move Horizontal Axes Velocity", canvas.width/2, 200);
        ctx.fillText("W / UP ARROW -> Jump (Engine Gravity Assisted physics)", canvas.width/2, 240);
        ctx.fillText("F KEY -> Strike Melee Punch Jab Combos", canvas.width/2, 280);
        ctx.fillText("Q KEY -> Spin Dash Roll Blitz Charge Attack Mode", canvas.width/2, 320);
        ctx.fillText("STORY HINT: Jump up high directly into Eggman's ship shell to damage him!", canvas.width/2, 380);
        renderCoolButton(buttons.backToMenu);
    } 
    else if (gameState === "ADMIN_MENU") {
        ctx.fillStyle = "#090014"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#ff00bb"; ctx.font = "bold 26px Impact"; ctx.textAlign = "center";
        ctx.fillText("ADMIN SANCTUM CHARACTER ACTIVATION", canvas.width/2, 180);
        
        let btnHyper = { x: 320, y: 320, w: 210, h: 50, text: "HYPER SONIC" };
        let btnDark = { x: 570, y: 320, w: 210, h: 50, text: "DARK SONIC" };
        renderCoolButton(btnHyper); renderCoolButton(btnDark);
        renderCoolButton(buttons.backToMenu);

        canvas.onclick = (e) => {
            const r = canvas.getBoundingClientRect();
            const mx = e.clientX - r.left; const my = e.clientY - r.top;
            if(mx > btnHyper.x && mx < btnHyper.x+btnHyper.w && my > btnHyper.y && my < btnHyper.y+btnHyper.h) {
                selectedCharacter = CHARACTERS.HYPER; currentForm = "Hyper"; initGameSession(); gameState = "PLAYING";
            }
            if(mx > btnDark.x && mx < btnDark.x+btnDark.w && my > btnDark.y && my < btnDark.y+btnDark.h) {
                selectedCharacter = CHARACTERS.DARK; currentForm = "Dark"; initGameSession(); gameState = "PLAYING";
            }
        };
    } 
    else if (gameState === "SUPER_CUTSCENE") {
        superCutsceneTimer += 1;
        ctx.fillStyle = "#000310"; ctx.fillRect(0,0,canvas.width,canvas.height);
        let centerX = canvas.width / 2; let centerY = canvas.height / 2 - 30;
        let floatY = centerY + Math.sin(superCutsceneTimer * 0.05) * 10;
        
        ctx.save(); ctx.translate(centerX, floatY); ctx.fillStyle = selectedCharacter.baseColor;
        ctx.beginPath(); ctx.moveTo(-10, -25); ctx.lineTo(-32, -12); ctx.lineTo(-12, -2); ctx.fill();
        ctx.fillRect(-16, -12, 28, 34); ctx.beginPath(); ctx.arc(0, -22, 18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#e51c23"; ctx.fillRect(-18, 22, 16, 12); ctx.fillRect(2, 22, 16, 12); ctx.restore();

        let orbitRadius = 160 - (superCutsceneTimer * 0.6); if (orbitRadius < 5) orbitRadius = 0; 
        let orbitSpeed = superCutsceneTimer * 0.07;
        for(let i=0; i<7; i++) {
            let angle = (i * (Math.PI * 2) / 7) + orbitSpeed;
            let gemX = centerX + Math.cos(angle) * orbitRadius; let gemY = floatY + Math.sin(angle) * orbitRadius;
            ctx.save(); ctx.fillStyle = EMERALD_COLORS[i]; ctx.shadowColor = EMERALD_COLORS[i]; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.moveTo(gemX, gemY - 12); ctx.lineTo(gemX + 9, gemY); ctx.lineTo(gemX, gemY + 12); ctx.lineTo(gemX - 9, gemY); ctx.closePath(); ctx.fill(); ctx.restore();
        }
        if (superCutsceneTimer > 240) {
            ctx.fillStyle = `rgba(255,255,255,${superCutsceneTimer >= 265 ? 1.0 : (superCutsceneTimer-240)/25})`; ctx.fillRect(0,0,canvas.width,canvas.height);
        }
        if (superCutsceneTimer >= 290) {
            currentForm = "Super"; players[0].form = "Super"; players[0].maxHp = 250; players[0].hp = 250;
            gameState = "PLAYING"; bossTimer = 60;
        }
    } 
    else if (gameState === "PLAYING") {
        if (gameMode === "BATTLEGROUND") {
            bossTimer -= dt;
            if(bossTimer <= 0 && !boss) {
                boss = new CampaignBoss("EGGMAN");
                boss.hp = 600; boss.maxHp = 600; 
            }
        }

        drawGreenHillStage(Date.now()*0.001);
        if (boss) { boss.update(); boss.draw(); }
        players.forEach(p => { p.update(); p.draw(); });

        for(let i = particles.length - 1; i >= 0; i--) {
            particles[i].update(); particles[i].draw();
            if(particles[i].life <= 0) particles.splice(i, 1);
        }

        // --- TOP BAR HUD OVERLAY ---
        ctx.fillStyle = "rgba(0, 0, 15, 0.6)"; ctx.fillRect(0, 0, canvas.width, 52);
        ctx.strokeStyle = "rgba(0, 170, 255, 0.3)"; ctx.lineWidth = 1; ctx.strokeRect(0, 0, canvas.width, 52);
        renderCoolButton(buttons.backToMenu);

        ctx.fillStyle = "#ffffff"; ctx.font = "bold 12px monospace"; ctx.textAlign = "left";
        ctx.fillText(`FIGHTER: ${selectedCharacter.name} [${currentForm}]`, 155, 31);
        
        ctx.fillStyle = "#ffff00";
        if (gameMode === "BATTLEGROUND") {
            ctx.fillText(`CHAOS EMERALDS: ${collectedEmeralds} / 7`, 420, 31);
            for(let g=0; g<collectedEmeralds; g++) { ctx.fillStyle = EMERALD_COLORS[g]; ctx.fillRect(575 + (g * 14), 21, 9, 11); }
            ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.font = "11px monospace"; ctx.textAlign = "right";
            if(!boss) ctx.fillText(`EGGMAN DROP IN: ${Math.max(0, Math.floor(bossTimer))}s`, canvas.width - 20, 31);
            else ctx.fillText("BOSS CARRIER DETECTED!", canvas.width - 20, 31);
        } else {
            ctx.fillText(`STORY MODE: LEVEL ${currentStoryLevel} / 16`, 420, 31);
            ctx.fillStyle = "rgba(255,255,255,0.7)"; ctx.font = "11px monospace"; ctx.textAlign = "right";
            if (boss) ctx.fillText(`BOSS FIGHT ACTIVE - FOCUS FIRE TARGET`, canvas.width - 20, 31);
            else ctx.fillText(`ELIMINATE ALL ROBOTIC BADNIKS`, canvas.width - 20, 31);
        }
    }

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
